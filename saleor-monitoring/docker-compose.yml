services:
  grafana:
    image: grafana/grafana:latest
    container_name: monitoring-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
      # Tắt login form nếu muốn truy cập nhanh (optional, bỏ comment để dùng)
      # - GF_AUTH_ANONYMOUS_ENABLED=true
      # - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    volumes:
      - grafana_data:/var/lib/grafana
      # ── Provisioning: datasource + dashboard provider ──────────────
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      # ── Dashboard JSON files (auto-reload mỗi 30s) ─────────────────
      - ./grafana/provisioning/dashboards/json:/var/lib/grafana/dashboards:ro
    restart: unless-stopped
    networks:
      - saleor_net

  prometheus:
    image: prom/prometheus:latest
    container_name: monitoring-prometheus
    # File prometheus.yml trên host có permission 640 (rw-r-----)
    # Prometheus mặc định chạy user "nobody" → không đọc được file
    # Chạy root trong container (an toàn nhờ Docker isolation)
    user: root
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    restart: unless-stopped
    networks:
      - saleor_net

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.2
    container_name: monitoring-cadvisor
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /run/containerd/containerd.sock:/run/containerd/containerd.sock:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    privileged: true
    pid: host
    devices:
      - /dev/kmsg
    restart: unless-stopped
    networks:
      - saleor_net

  # === Database Exporters ===

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.16.0
    container_name: monitoring-postgres-exporter
    ports:
      - "9187:9187"
    environment:
      - DATA_SOURCE_NAME=postgresql://saleor:saleor@db:5432/saleor?sslmode=disable
    restart: unless-stopped
    networks:
      - saleor_net

  redis-exporter:
    image: oliver006/redis_exporter:v1.67.0
    container_name: monitoring-redis-exporter
    ports:
      - "9121:9121"
    environment:
      - REDIS_ADDR=redis://redis:6379
    restart: unless-stopped
    networks:
      - saleor_net

  # === Tracing Pipeline (chuyển từ saleor-platform) ===

  jaeger:
    image: jaegertracing/jaeger
    container_name: monitoring-jaeger
    ports:
      - "16686:16686"   # Jaeger UI
      - "4317"          # OTLP gRPC (chỉ internal, không expose ra host)
      - "4318"          # OTLP HTTP (chỉ internal)
    restart: unless-stopped
    networks:
      - saleor_net
    volumes:
      - type: tmpfs
        target: /tmp

volumes:
  grafana_data:
  prometheus_data:

networks:
  saleor_net:
    external: true
    name: saleor-platform_saleor-backend-tier

