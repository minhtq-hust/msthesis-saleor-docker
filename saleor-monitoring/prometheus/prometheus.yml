global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
    metric_relabel_configs:
      # Tạo label "service" ngắn gọn (vd: api, db, redis, worker...)
      - source_labels: [container_label_com_docker_compose_service]
        target_label: service
      # Tạo label "project" (vd: saleor-platform, saleor-monitoring)
      - source_labels: [container_label_com_docker_compose_project]
        target_label: project
      # Xóa tất cả label container_label_* dài dòng
      - regex: 'container_label_.*'
        action: labeldrop

  # Scrape RED metrics (Rate, Error, Duration) từ OTel Collector
  # OTel Collector nằm ở saleor-platform stack, dùng container name qua shared network
  - job_name: 'otel-collector'
    static_configs:
      - targets: ['platform-otel-collector:8889']
    scrape_interval: 15s
