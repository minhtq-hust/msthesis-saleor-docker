# OpenTelemetry Collector Configuration
# Vai trò: Nhận traces từ Saleor API → tạo Prometheus metrics (RED)
#          + forward traces tới Jaeger.
#
# Pipeline:
#   Saleor API ──(OTLP)──► [receivers/otlp]
#                               │
#                     ┌─────────┴──────────┐
#                     ▼                    ▼
#           [exporters/otlp]      [connectors/spanmetrics]
#                 │                        │
#                 ▼                        ▼
#              Jaeger              [exporters/prometheus]
#           (traces UI)                    │
#                                          ▼
#                                     Prometheus
#                                    (metrics DB)
#
# ─── Giải quyết vấn đề DNS race condition ─────────────────────────────────
# Khi restart, Jaeger container có thể chưa đăng ký vào Docker DNS khi
# otel-collector bắt đầu resolve. Cấu hình này giải quyết bằng:
#   1. dns:/// scheme → gRPC liên tục re-resolve DNS (không cache IP)
#   2. wait_for_ready: true → gRPC chờ connection sẵn sàng trước khi send
#   3. retry_on_failure với initial_interval dài → chịu được Jaeger chưa start
#   4. health_check extension → expose /health/ready endpoint cho monitoring
# ──────────────────────────────────────────────────────────────────────────

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317  # Listen on all interfaces (localhost + Docker network)
      http:
        endpoint: 0.0.0.0:4318  # HTTP receiver — dùng cho Celery worker (prefork không tương thích gRPC)


connectors:
  # Chuyển đổi traces → metrics (RED: Rate, Error, Duration)
  span_metrics:
    histogram:
      explicit:
        buckets: [5ms, 10ms, 25ms, 50ms, 100ms, 250ms, 500ms, 1s, 2.5s, 5s, 10s]

exporters:
  # Forward traces tới Jaeger (monitoring stack, dùng container name qua shared network)
  otlp_grpc/jaeger:
    endpoint: dns:///monitoring-jaeger:4317   # dns:/// scheme → gRPC tự re-resolve khi connection fail
    tls:
      insecure: true
    wait_for_ready: true                      # Chờ kết nối sẵn sàng, không drop traces khi Jaeger chưa start
    balancer_name: round_robin                # Re-resolve DNS khi mất kết nối (mặc định pick_first cache IP mãi)
    retry_on_failure:
      enabled: true
      initial_interval: 10s                  # Thời gian chờ lần đầu (cho Jaeger có thời gian start)
      max_interval: 60s                      # Max backoff 60s
      max_elapsed_time: 300s                 # Retry tối đa 5 phút (đủ cho Jaeger healthy hoàn toàn)
    sending_queue:
      enabled: true
      queue_size: 5000                       # Buffer 5000 batch traces khi Jaeger down
      num_consumers: 4                       # 4 goroutine xử lý queue song song

  # Expose metrics cho Prometheus scrape
  prometheus:
    endpoint: 0.0.0.0:8889
    namespace: otel

service:
  extensions: [health_check]
  pipelines:
    traces:
      receivers: [otlp]
      exporters: [otlp_grpc/jaeger, span_metrics]
    metrics:
      receivers: [span_metrics]
      exporters: [prometheus]
