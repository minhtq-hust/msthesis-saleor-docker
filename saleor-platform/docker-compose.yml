services:
  api:
    image: docker.io/minhtq2/saleor:1.02
    ports:
      - 8000:8000
    restart: unless-stopped
    networks:
      - saleor-backend-tier
    stdin_open: true
    tty: true
    depends_on:
      db:
        condition: service_started
      redis:
        condition: service_started
      otel-collector:
        condition: service_started
    volumes:
      # shared volume between worker and api for media
      - saleor-media:/app/media
    env_file:
      - common.env
      - backend.env
    environment:
      - DASHBOARD_URL=http://localhost:9000/
      - ALLOWED_HOSTS=localhost,api,host.docker.internal
    command:
      - sh
      - -c
      - |
        pip install --quiet --no-cache-dir \
          opentelemetry-instrumentation-psycopg==0.53b1 \
          opentelemetry-instrumentation-redis==0.53b1 \
          opentelemetry-instrumentation-celery==0.53b1 \
          opentelemetry-instrumentation-httpx==0.53b1 \
          opentelemetry-instrumentation-urllib3==0.53b1 && \
        opentelemetry-instrument uvicorn saleor.asgi:application \
          --host=0.0.0.0 --port=8000 --lifespan=off \
          --ws=none --no-server-header --no-access-log \
          --timeout-keep-alive=35 --timeout-graceful-shutdown=30 \
          --limit-max-requests=10000

  dashboard:
    image: ghcr.io/saleor/saleor-dashboard:latest
    ports:
      - 9000:80
    restart: unless-stopped

  db:
    image: library/postgres:15-alpine
    ports:
      - 5432:5432
    restart: unless-stopped
    networks:
      - saleor-backend-tier
    volumes:
      - saleor-db:/var/lib/postgresql/data
      - ./replica_user.sql:/docker-entrypoint-initdb.d/replica_user.sql:ro,z
    environment:
      - POSTGRES_USER=saleor
      - POSTGRES_PASSWORD=saleor
    command: >
      postgres
        -c shared_preload_libraries=pg_stat_statements
        -c pg_stat_statements.track=all
        -c log_min_duration_statement=500
        -c log_statement=none
        -c log_line_prefix='%t [%p] %d '

  redis:
    image: library/redis:7.0-alpine
    ports:
      - 6379:6379
    restart: unless-stopped
    networks:
      - saleor-backend-tier
    volumes:
      - saleor-redis:/data
    command: >
      redis-server
        --slowlog-log-slower-than 10000
        --slowlog-max-len 128
        --latency-monitor-threshold 50

  worker:
    image: docker.io/minhtq2/saleor:1.02
    command:
      - sh
      - -c
      - |
        pip install --quiet --no-cache-dir \
          opentelemetry-instrumentation-celery==0.53b1 \
          opentelemetry-instrumentation-psycopg==0.53b1 \
          opentelemetry-instrumentation-redis==0.53b1 && \
        opentelemetry-instrument celery -A saleor --app=saleor.celeryconf:app worker --loglevel=info -B
    restart: unless-stopped
    networks:
      - saleor-backend-tier
    env_file:
      - common.env
      - backend.env
    depends_on:
      redis:
        condition: service_started
      mailpit:
        condition: service_started
      otel-collector:
        condition: service_started
    volumes:
      # shared volume between worker and api for media
      - saleor-media:/app/media
    environment:
      - OTEL_SERVICE_NAME=saleor-worker

  mailpit:
    image: axllent/mailpit
    ports:
      - 1025:1025 # smtp server
      - 8025:8025 # web ui. Visit http://localhost:8025/ to check emails
    restart: unless-stopped
    networks:
      - saleor-backend-tier

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.152.1
    container_name: platform-otel-collector
    ports:
      - "4317:4317"     # OTLP gRPC — nhận traces từ Saleor API
      - "8889:8889"     # Prometheus metrics endpoint
    volumes:
      - ./otelcol/config.yaml:/etc/otelcol-contrib/config.yaml:ro
    restart: unless-stopped
    networks:
      - saleor-backend-tier

volumes:
  saleor-db:
    driver: local
  saleor-redis:
    driver: local
  saleor-media:

networks:
  saleor-backend-tier:
    driver: bridge

